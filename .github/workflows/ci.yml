name: CI

on:
  push:
    branches: [master]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        julia-version: ['1.10', '1.12']
    steps:
      - uses: actions/checkout@v4
      - uses: julia-actions/setup-julia@v2
        with:
          version: ${{ matrix.julia-version }}
      - uses: julia-actions/cache@v2
      - name: Install dependencies
        run: |
          julia --project -e '
            using Pkg
            Pkg.instantiate()
          '
      - name: Run tests
        run: |
          julia --project -e '
            include("test/test_analytical.jl")
            include("test/test_physics.jl")
            include("test/test_axcaliber_pinn.jl")
          '
